framework:
    validation:
        # Enables validator auto-mapping support.
        # For instance, basic validation constraints will be inferred from Doctrine's metadata.
        #auto_mapping:
        #    App\Entity\: []

when@test:
    framework:
        validation:
            not_compromised_password: false

# The Panther-managed HTTP server runs E2E in the 'panther' env; disable the live
# HaveIBeenPwned lookup there too so tests don't depend on an external service.
when@panther:
    framework:
        validation:
            not_compromised_password: false
