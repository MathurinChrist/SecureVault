services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    volumes:
      - .:/app
      # Shadow host vendor/ with container-built one (avoids PHP version mismatch)
      - vendor_data:/app/vendor
      # Persist JWT keys generated by entrypoint on first boot
      - jwt_keys:/app/config/jwt
    environment:
      APP_ENV: dev
      APP_SECRET: ${APP_SECRET:-change-me-run-php-bin-console-secrets-generate}
      DATABASE_URL: postgresql://app:!ChangeMe!@database:5432/app?serverVersion=16&charset=utf8
      MAILER_DSN: smtp://mailer:1025
      MESSENGER_TRANSPORT_DSN: doctrine://default?auto_setup=0
      # AES-256 key for password encryption — override via .env.local for real data
      VAULT_ENCRYPTION_KEY: ${VAULT_ENCRYPTION_KEY:-docker-dev-key-change-in-production!!}
      # JWT — absolute paths inside the container
      JWT_SECRET_KEY: /app/config/jwt/private.pem
      JWT_PUBLIC_KEY: /app/config/jwt/public.pem
      JWT_PASSPHRASE: ${JWT_PASSPHRASE:-securevault}
      JWT_TTL: "3600"
      # Panther / E2E (Chrome runs --no-sandbox in Docker)
      PANTHER_NO_SANDBOX: "1"
      PANTHER_CHROME_DRIVER_BINARY: /usr/bin/chromedriver
    depends_on:
      database:
        condition: service_healthy

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-app}", "-U", "${POSTGRES_USER:-app}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - database_data:/var/lib/postgresql/data:rw
    ports:
      - "5432:5432"

  mailer:
    image: axllent/mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  database_data:
  jwt_keys:
  vendor_data:
